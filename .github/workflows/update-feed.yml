name: 🔄 Update Blog Feed

on:
  push:
    branches: [main, master]
    paths:
      - 'posts/**'
      - 'config.json'
      - 'scripts/**'
  workflow_dispatch:  # Ручной запуск

# Права для коммита и деплоя Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 🔍 Линтер постов
        run: |
          python scripts/lint_posts.py

      - name: 📦 Проверка структуры
        run: |
          echo "📂 Проверка папки posts..."
          if [ ! -d "posts" ]; then
            echo "❌ Папка posts не найдена!"
            exit 1
          fi

          echo "📄 Проверка конфигов..."
          if [ ! -f "config.json" ]; then
            echo "❌ Файл config.json не найден!"
            exit 1
          fi

          echo "📜 Проверка скрипта..."
          if [ ! -f "scripts/generate_feed.py" ]; then
            echo "❌ Скрипт generate_feed.py не найден!"
            exit 1
          fi

          echo "✅ Все файлы на месте"

      - name: 🚀 Генерация ленты
        run: |
          echo "🎯 Запуск генератора..."
          python scripts/generate_feed.py

          echo "📊 Результат:"
          echo "- posts: $(ls -1 posts/*.md 2>/dev/null | wc -l)"
          echo "- feed.json: $(test -f feed.json && echo '✅' || echo '❌')"
          echo "- posts_all.json: $(test -f posts_all.json && echo '✅' || echo '❌')"
          echo "- README.md: $(test -f README.md && echo '✅' || echo '❌')"
          echo "- atom.xml: $(test -f atom.xml && echo '✅' || echo '❌')"

      - name: 💾 Коммит изменений
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add feed.json posts_all.json README.md atom.xml

          if git diff --staged --quiet; then
            echo "ℹ️  Нет изменений для коммита"
          else
            git commit -m "🔄 Авто-обновление ленты [skip ci]"
            git push
            echo "✅ Запушены обновления"
          fi

      - name: 📝 Лог постов
        if: always()
        run: |
          echo "📋 Последние посты:"
          ls -lt posts/*.md 2>/dev/null | head -5 || echo "Посты не найдены"

  deploy-pages:
    needs: update-feed
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4

      - name: 📁 Подготовка файлов для Pages
        run: |
          mkdir -p _site
          # Копируем сайт
          cp -r site/* _site/
          # Копируем данные
          cp feed.json posts_all.json atom.xml _site/
          # Копируем посты (для чтения полных текстов)
          cp -r posts _site/
          echo "📄 Файлы для Pages:"
          ls -la _site/

      - name: ⬆️ Деплой на GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
